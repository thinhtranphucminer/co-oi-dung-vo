<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Bài 7</title>
</head>
<body>

<h2>Đóng góp ý kiến cho thư viện của nhà trường</h2>

<form onsubmit="hienThongBao(event)">

<!-- NHIỆM VỤ 1 -->
<h3>1. Thông tin về người góp ý</h3>

Họ và tên:
<input type="text" id="ten">
<br><br>

Địa chỉ email:
<input type="text">
<br><br>

<!-- NHIỆM VỤ 2 -->
<h3>2. Thông tin bổ sung</h3>

Lớp:
<input type="radio" name="lop"> 10
<input type="radio" name="lop"> 11
<input type="radio" name="lop"> 12
<br><br>

Bạn quan tâm đến:
<input type="checkbox"> Sách
<input type="checkbox"> Máy tính
<input type="checkbox"> Wifi
<br><br>

<!-- NHIỆM VỤ 3 -->
<h3>3. Đóng góp ý kiến</h3>

Ý kiến đóng góp:<br>
<textarea id="ykien" rows="5" cols="40"></textarea>

<br><br>

<input type="submit" value="Gửi">
<input type="reset" value="Hủy">

</form>
    
<hr>

<div id="ketqua"></div>

<script>
function hienThongBao(event){
    event.preventDefault();

    let ten = document.getElementById("ten").value;
    let ykien = document.getElementById("ykien").value;

    document.getElementById("ketqua").innerHTML =
        "<h3>Cảm ơn " + ten + "!</h3>" +
        "<p>Ý kiến của bạn:</p>" + ykien;
}
</script>

</body>
</html>
