<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Bài 7 - Tạo biểu mẫu</title>
</head>
<body>

<h2>Đóng góp ý kiến cho thư viện của nhà trường</h2>

<form>

<!-- NHIỆM VỤ 1 -->
<h3>1. Thông tin về người góp ý</h3>

<label>Họ và tên:
    <input type="text" name="txtTen">
</label>
<br><br>

<label>Địa chỉ email:
    <input type="text" name="txtEmail">
</label>

<!-- NHIỆM VỤ 2 -->
<h3>2. Thông tin bổ sung</h3>

<p>Lớp:</p>
<input type="radio" name="lop" value="10"> Lớp 10
<input type="radio" name="lop" value="11"> Lớp 11
<input type="radio" name="lop" value="12"> Lớp 12
<br><br>

<p>Bạn quan tâm đến:</p>
<input type="checkbox" name="cbSach"> Sách
<input type="checkbox" name="cbMayTinh"> Máy tính
<input type="checkbox" name="cbWifi"> Wifi
<br><br>

<!-- NHIỆM VỤ 3 -->
<h3>3. Đóng góp ý kiến</h3>

<label>Ý kiến đóng góp:</label><br>
<textarea name="txtComment" rows="6" cols="40"></textarea>

<br><br>

<input type="submit" value="Gửi">
<input type="reset" value="Hủy">

</form>

</body>
</html>
